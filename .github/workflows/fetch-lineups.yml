name: スタメン自動取得

on:
  # 毎日 JST 0:00〜14:00 の間、15分ごとに実行
  # (W杯の試合は日本時間 0:00〜13:00 付近に集中)
  schedule:
    - cron: "*/15 15,16,17,18,19,20,21,22,23,0,1,2,3,4,5" # UTC (= JST-9)

  # 手動実行も可能
  workflow_dispatch:

jobs:
  fetch-lineups:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージのインストール
        run: pip install requests

      - name: スタメン取得スクリプトを実行
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/fetch_lineups.py

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name  "teamsheet-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/matches/index.json
          git diff --cached --quiet || git commit -m "スタメン更新 $(date '+%Y-%m-%d %H:%M') JST"
          git push
